{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="copyright" content="Baby Low Weight Prediction">
    <title>Baby Low Weight Prediction</title>
    <link rel="stylesheet" href="{% static 'css/maicons.css' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/owl-carousel/css/owl.carousel.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/animate/animate.css' %}">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Global Styles */
        body {
            background: url('{% static "images/premium_bg.png" %}') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Outfit', sans-serif;
            color: #333;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #fcedf2;
        }

        /* Background Image Overlay - Reduced for clarity */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            z-index: -1;
        }

        /* Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.7) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            transition: background-color 0.3s ease;
        }

        .navbar-brand {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2c3e50;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #FF6E7F, #bfe9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .navbar-brand img {
            width: 50px;
            margin-right: 15px;
            transition: transform 0.3s ease;
        }

        .navbar-brand img:hover {
            transform: scale(1.1);
        }

        .nav-item .btn-primary {
            background: linear-gradient(135deg, #FF6E7F 0%, #bfe9ff 100%);
            border: none;
            border-radius: 30px;
            padding: 10px 25px;
            font-weight: 600;
            letter-spacing: 1px;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 110, 127, 0.4);
            transition: all 0.3s ease;
            text-transform: none; /* remove all caps */
        }

        .nav-item .btn-primary:hover {
            background: linear-gradient(135deg, #bfe9ff 0%, #FF6E7F 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 110, 127, 0.6);
            color: white;
        }

        /* Main Content */
        .container-fluid {
            padding-top: 120px;
            padding-bottom: 60px;
        }

        .content-section {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            padding: 60px;
            margin: 40px auto;
            max-width: 1400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Back to Top Button */
        .back-to-top {
            position: fixed;
            bottom: 50px;
            right: 50px;
            background: linear-gradient(135deg, #FF6E7F, #bfe9ff);
            color: #fff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            opacity: 0.8;
            box-shadow: 0 4px 15px rgba(255, 110, 127, 0.4);
            transition: all 0.3s ease;
        }

        .back-to-top:hover {
            opacity: 1;
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 110, 127, 0.6);
            color: white;
        }

        /* Footer */
        footer {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            color: #333;
            padding: 20px 0;
            text-align: center;
            margin-top: 50px;
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        footer p {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 400;
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            .navbar-brand {
                font-size: 1.8rem;
            }

            .navbar-brand img {
                width: 40px;
            }

            .nav-item .btn-primary {
                padding: 10px 20px;
                margin: 5px 0;
            }

            .content-section {
                padding: 40px;
                margin: 30px;
            }

            .container-fluid {
                padding-top: 100px;
            }
        }

        @media (max-width: 768px) {
            .navbar-brand {
                font-size: 1.6rem;
            }

            .nav-item .btn-primary {
                width: 100%;
                text-align: center;
                padding: 12px;
            }

            .content-section {
                padding: 30px;
                margin: 20px;
            }

            .back-to-top {
                width: 50px;
                height: 50px;
                bottom: 30px;
                right: 30px;
            }
        }

        @media (max-width: 576px) {
            .navbar-brand {
                font-size: 1.4rem;
            }

            .navbar-brand img {
                width: 35px;
            }

            .content-section {
                padding: 20px;
                margin: 15px;
            }

            .container-fluid {
                padding-top: 80px;
            }
        }

        /* Accessibility Enhancements */
        .btn-primary:focus {
            outline: 3px solid #6ab4ff;
            outline-offset: 2px;
        }

        .back-to-top:focus {
            outline: 3px solid #fff;
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <!-- Back to Top Button -->
    <a href="#" class="back-to-top" aria-label="Back to top"><i class="fas fa-chevron-up"></i></a>

    <!-- Header -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-light fixed-top" aria-label="Main navigation">
            <div class="container">
                <a class="navbar-brand" href="#">
                    Baby Low Weight Prediction
                </a>
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupport"
                    aria-controls="navbarSupport" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupport">
                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item"><a class="btn btn-primary ml-lg-3" href="{% url 'UserHome' %}">Home</a>
                        </li>
                        <li class="nav-item"><a class="btn btn-primary ml-lg-3"
                                href="{% url 'DatasetView' %}">Dataset</a></li>
                        <li class="nav-item"><a class="btn btn-primary ml-lg-3" href="{% url 'training' %}">Training</a>
                        </li>
                        <li class="nav-item"><a class="btn btn-primary ml-lg-3"
                                href="{% url 'prediction' %}">Predict</a></li>
                        <li class="nav-item"><a class="btn btn-primary ml-lg-3" href="{% url 'index' %}">Logout</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <div class="container-fluid">
        <div class="content-section">
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>© 2025 Baby Low Weight Prediction. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="{% static 'js/jquery-3.5.1.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'vendor/owl-carousel/js/owl.carousel.min.js' %}"></script>
    <script src="{% static 'vendor/wow/wow.min.js' %}"></script>
    <script src="{% static 'js/theme.js' %}"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>

</html>
